name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

# 連続 push で古いジョブが走り続けないよう、同じ ref の進行中ジョブをキャンセルする
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 最小権限の原則: このワークフローは読むだけ
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # サプライチェーン耐性のため commit SHA で固定。バージョンはコメントで管理する
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (unit)
        run: npm run test:unit

      - name: Test (hooks / bats)
        run: npm run test:hooks

      - name: Build
        run: npm run build
