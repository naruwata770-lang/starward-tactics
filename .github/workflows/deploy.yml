name: Deploy redirect page to GitHub Pages

# GitHub Pages は本番ホスティングから Vercel (starward-tactics.vercel.app) に
# 移行済み。このワークフローは旧 URL (naruwata770-lang.github.io/starward-tactics/)
# にアクセスしたユーザーを meta refresh + canonical で Vercel に逃がすだけの
# 静的リダイレクトページを publish する。
#
# 静的ホスティングでは真の 301 を返せないが、meta refresh + rel=canonical +
# JS fallback の 3 層で SEO / UX の実害を最小化している。

on:
  push:
    branches: [main]

# 同時デプロイを防止し、進行中のデプロイは完了を待つ (中途半端なデプロイを避ける)
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # サプライチェーン耐性のため commit SHA で固定。バージョンはコメントで管理する
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build redirect page
        run: |
          mkdir -p dist
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="ja">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1" />
              <title>星の翼 戦術ボードは新しい URL に移動しました</title>
              <meta http-equiv="refresh" content="0; url=https://starward-tactics.vercel.app/" />
              <link rel="canonical" href="https://starward-tactics.vercel.app/" />
              <meta name="robots" content="noindex" />
              <style>
                body { font-family: system-ui, sans-serif; max-width: 40em; margin: 4em auto; padding: 0 1em; line-height: 1.6; }
                a { color: #0366d6; }
              </style>
            </head>
            <body>
              <h1>新しい URL に移動しました</h1>
              <p>
                星の翼 戦術ボードは
                <a href="https://starward-tactics.vercel.app/">https://starward-tactics.vercel.app/</a>
                に移動しました。自動でジャンプしない場合はリンクをクリックしてください。
              </p>
              <script>
                // meta refresh が無効化されているブラウザ向けフォールバック。
                // location.replace を使うと履歴に旧 URL が残らず「戻る」ループを防げる
                location.replace('https://starward-tactics.vercel.app/' + (location.search || '') + (location.hash || ''));
              </script>
            </body>
          </html>
          HTML

      # 404 経由のディープリンクも救えるよう 404.html にも同じ内容を出す
      - name: Duplicate as 404.html
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
